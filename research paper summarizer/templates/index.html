<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PaperMind • AI Research Summarizer</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

<div class="header">

<div class="logo">
<i class="fas fa-brain"></i>
<h1>PaperMind</h1>
</div>

<p class="tagline">AI-Powered Research Paper Summarizer</p>

</div>


<div class="main-card">

<form id="form">

<div class="upload-area" id="uploadArea">

<i class="fas fa-cloud-upload-alt upload-icon"></i>

<h3>Upload Research Paper</h3>

<p class="upload-text">PDF format • Max 50MB recommended</p>

<input type="file" id="file" name="file" accept=".pdf" required>

<button type="button" class="browse-btn" id="browseBtn">
Browse Files
</button>

</div>


<div class="form-group">

<label for="length">Summary Length</label>

<select id="length" name="length" class="dropdown">

<option value="short">Short — Quick Overview</option>

<option value="medium" selected>Medium — Balanced Summary</option>

<option value="long">Large — Detailed Analysis</option>

</select>

</div>


<button type="submit" id="btn" class="submit-btn">

<i class="fas fa-magic"></i>

Generate Summary

</button>


<div class="loader" id="loader">

<div class="spinner"></div>

<span>Processing your paper...</span>

</div>


<div class="progress-container hidden" id="progressBox">

<div class="progress-label">

<span id="progressText">0%</span>

<span id="statusText">Reading document...</span>

</div>

<div class="progress-bar-bg">

<div class="progress-bar" id="progressBar"></div>

</div>

</div>


<div class="output-card hidden" id="outputCard">

<div class="output-header">

<h2>Research Summary</h2>

<button type="button" id="downloadBtn" class="download-btn">

<i class="fas fa-download"></i>

Download as .txt

</button>

</div>

<div class="output" id="output"></div>


<div class="chat-box" id="chatBox">

<h3>Chat with this Paper</h3>

<div id="chatMessages" class="chat-messages"></div>

<div class="chat-input-area">

<input
type="text"
id="chatInput"
placeholder="Ask something about this paper..."
/>

<button type="button" id="chatBtn">

Ask

</button>

</div>

</div>

</div>

</form>

</div>

<div class="footer">

Powered by Gemini • Groq • Llama

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
